body:
  text: 卷三月經前期其症血來如豬肝水五心作熱腰痛小腹痛面色痿黃不思飲食此乃血氣皆虛先服黃芩散退其煩熱後用調經丸次月血勝人安黃芩散黃芩六分川歸一錢川芎八分白芍蒼朮知母花粉各七分水煎溫服一方無蒼朮白芍有甘草七分調經丸三稜蓬朮川歸白芍生地熟地元胡白茯苓各一兩川芎砂仁烏藥各八錢香附一兩二錢大小茴各二兩共為末米糊丸桐子大早每服百丸溫酒下月經後期其症經來如屋漏水頭昏目眩小腹作痛更兼白帶咽中如魚腥噁心吐逆先用理經四物湯次服內補當歸丸次月即愈理經四物湯川芎川歸白芍生地白朮柴胡香附元胡索各一錢黃芩三稜各八分水煎臨臥服內補當歸丸川斷阿膠白芷蓯蓉蒲黃炒黑厚朴吳茱萸附子當歸茯苓各一兩川芎白芍各八錢甘草乾薑各五錢熟地一兩五錢為末蜜丸桐子大空心白湯下八十丸月經或前或後此症因脾土不勝不思飲食由此血衰月水往後或次月飲食多進月水又往前矣用藥只宜理脾脾土勝旺血勻氣順自然應期紫金丸青皮陳皮各五錢蒼朮檳榔砂仁紅豆各六錢良薑枳殼烏藥香附各八錢三稜一兩蓬朮二兩為末米糊丸食後米湯下百丸一方無莪朮蒼朮香附血虛發熱其症因婦人性急或當行經時房事觸傷腹中結塊如雞子大左右而動月水不行變作五心煩熱頭昏目眩咳嗽生痰先用逍遙散止其五心之熱次用紫菀湯止其嗽若半年失醫肉瘦泄瀉必死逍遙散白朮川歸白芍花粉元胡各八分地骨皮石蓮子各一錢黃芩薄荷各四分龍膽草五分為散服或煎服一方無黃芩紫菀湯紫菀阿膠蛤粉炒研末沖川貝去心桔梗蘇子各八分五味子五分款冬花六分桑白皮蜜炙知母蜜炙枳殼各一錢杏仁去皮尖一錢二分陳皮一錢水煎臨臥服一方無陳皮血閉發熱其症因行經時及産後過食生冷並水果血見水則滯故也初起一二月生寒作熱五心煩躁口苦舌乾面色青黃易治先用逍遙散退其寒熱後用紫金丸漸納穀氣脾土一勝自然經血流通若年久不治變成骨蒸子午而發肌肉消瘦骨露泄瀉不止者百死無生若患家照前治之倘病更急或用鴉片三釐調甘草湯服之屢試屢驗行經氣痛經來一半余血未盡腹中作痛變作潮熱或無熱當用紅花當歸散破其餘血則痛止人安紅花當歸散紅花炒川歸牛膝蘇木各一錢川芎五分枳殼六分赤芍三稜莪朮芫花各八分臨臥煎服經來不止經來十日半月不止乃血妄行當審其婦曾吃椒薑熱物過度此熱症易治可用金狗散吳按亦有因虛弱淤滯淋漓不斷非僅屬熱症也又當審其脈症而治之金狗散金毛狗脊川斷阿膠地榆川芎川歸白芷各一錢白芍黃芩各八分熟地二錢空心服經來如黃泥水此大虛症忌用涼藥宜服加味四物湯以暖其經並和其血次月血勝而止加味四物湯川芎川歸元胡索各一錢烏藥一錢白芍小茴各八分熟地二錢姜二片空心服經來如銅緑水其症經來全無紅色此乃大虛大冷亦忌涼劑當服烏雞丸半月非特病愈且因有孕烏雞丸烏雞肉去皮油淨肉三兩酒蒸山藥肉桂蓯蓉蒲黃炒黑川歸山萸白芍各一兩熟地一兩五錢大附子三錢川芎五錢鹿茸一錢為末米糊丸空心酒下百丸經來全白色此症五心煩熱小便作痛面色青黃乃血氣虛也不宜涼藥亦宜服烏雞丸半月次月定有孕經來成塊如蔥白色經來成塊又如蔥白色或如死豬血黑色頭昏目眩口唇麻木此虛冷忌用涼藥急服內補當歸丸可愈經來臭如夏月腐此乃血弱更傷熱物而致譬如溝渠水乾天氣無雨久則臭也婦人身衰舊血少新血不接則亦臭如夏月腐也宜服龍骨丸兼湯藥龍骨丸龍骨海螵蛸生地各一錢牡蠣川歸白芍川芎黃芩白茯苓各八分為末蜜丸空心酒服百丸湯藥方當歸三稜莪朮赤芍丹皮白朮香附豬苓陳皮木通各八分姜一片煎服經來如魚髓每月經來如魚髓雙腳疼痛不能移動此乃下元虛冷更兼風邪所致行血行氣為宜蘇風止痛散天麻殭蠶烏藥牛膝各錢半獨活川芎紫金皮川歸乳香南藤骨碎補各一錢姜二片蔥白二根酒煎空心服經來如牛膜片經來不止兼下牛膜一樣片色昏迷倒地乃血氣結聚變成此症症雖驚人卻無事服朱雄丸立安朱雄丸硃砂雄黃各一錢白茯苓二兩為末水丸薑湯下五十丸經來下肉胞經來不止忽然下肉胞三五個如雞子大其軟如絮用刀割開肉似石榴子其婦昏迷不省人事症亦驚人亦不妨用十全大補湯五帖即安十全大補湯人參白朮茯苓炙甘草各三錢黃耆三錢肉桂六分川芎川歸白芍各錢半熟地四錢姜三片棗二枚空心煎服經來吊陰痛不可忍此症有兩條筋從陰吊至兩乳疼痛身上發熱服川楝湯二帖即安川楝湯川楝子豬苓澤瀉白朮小茴八角茴各一錢木香五分麻黃三分烏藥檳榔乳香元胡索各八分姜三片蔥一根煎服發汗經來小便痛如刀割此乃血門不通人多用八珍散不效急用牛膝湯一帖見功牛膝湯土牛膝三兩麝香半分乳香三錢水杯半煎牛膝至一杯磨二香入內空心服經來未盡潮熱氣痛經來一半覺口渴小便痛遍身潮熱頭痛此傷食生冷故血滯不行有餘血在內不宜用補只服莪朮散熱去經盡痛止潮安莪朮散莪朮三稜各錢半紅花五分蘇木牛膝各二錢空心煎服經來盡作痛此症手足麻痹乃腹中虛冷血氣衰弱四物湯川芎當歸白芍各三錢熟地四錢姜三片棗七枚煎服經來脅氣痛經來脅肉一塊如杯其色淡黑宜治氣為先四物元胡湯加入前方元胡索四兩沉香五錢酒煎服或為末酒調服經來小腹有血塊痛經來小腹結成塊或如皂角一條橫過痛不可忍不思飲食面色青黃服元胡散半月其塊自消元胡散元胡索四兩頭髮灰四錢為末酒調送經來遍身疼痛經來二三日遍身痛此寒邪入骨或熱或不熱俱宜解表烏藥順氣散烏藥殭蠶川芎白芷陳皮枳殼各八分乾薑甘草各五分麻黃四分姜三片蔥一根水煎溫服觸經傷寒經來忽然作渴誤食生冷遍身潮熱痰氣急滿惡寒四肢厥冷名觸經傷寒急投五積散可安五積散厚朴陳皮桔梗蒼朮川芎白芷白茯苓香附半夏當歸枳殼各二錢肉桂五分甘草八分白芍一錢半麻黃三分青皮一錢加姜三片蔥一根水煎熱服附五積交加散照上方加羌活獨活各一錢柴胡一錢五分人參邪勝者人參不可用逆經經從口鼻中出此因過食椒薑熱毒之物以致物傷其血熱則亂行服犀角地黃湯數帖犀角地黃湯犀角白芍丹皮枳殼各一錢生地二錢黃芩桔梗百草霜各八分甘草三分陳皮七分空心服經從口鼻出咳嗽氣急經不往下五心發熱咳嗽氣緊治宜推血下行先服紅花散七帖再服冬花散止嗽下氣不須五七帖即安紅花散紅花黃芩蘇木各八分花粉六分空心服冬花散款冬花桔梗枳殼蘇子紫菀知母粟殼蜜炙各八分石膏桑白皮蜜炙杏仁各一錢蘇梗八分水煎溫服每月經來二三次經來幾點而止過五六日或旬日又來幾點一月常行二三次面色青黃先用膠艾湯一二帖次服紫金丸膠艾湯阿膠白芍熟地各一錢艾葉三錢川芎八分棗三枚空心服經來狂言如見鬼神經來或家事怒氣觸阻逆血攻心不知人事狂言謬語先服麝香散定其心志後用茯神丸以除病根麝香散麝香甘草辰砂各三分木香五分人參茯神桔梗柴胡各八分遠志一錢茯神丸茯神茯苓遠志各八錢硃砂三錢豬心一個為末早米糊丸如豆大金銀湯送五十丸經來嘔吐經來時常嘔吐不思飲食宜服丁香散半月方愈丁香散丁香乾薑各五分白朮一錢為末每晨米湯調送三匙經來飲食後即吐此因痰在胸膈有阻米穀不能下胃急服烏梅丸化其痰涎後服九仙奪命丹烏梅丸硃砂雄黃木香各五錢硼砂乳香沒藥各一錢草果一個胡椒緑豆各三十五粒為末烏梅肉丸如楊梅大每服噙化一丸咽下九仙奪命丹豆豉木香陳皮山楂各一錢枳殼三錢草果一個厚朴茯苓蒼朮各二錢為末薑湯調下經來遍身浮腫此乃脾土不能克化水變為腫木香調胃散木香陳皮甘草各錢半三稜莪朮車前子大腹皮紅豆砂仁蒼朮木通山楂萆薢各一錢姜皮五分空心服經來泄瀉經動之時五更泄瀉如乳兒屎此乃腎虛不必治脾服理中湯七帖即安理中湯人參白朮各八分五味子甘草各三分乾薑五分空心服經前經後痢疾月水將臨傷食椒薑雞熱毒物毒攻五臟變作痢疾諸藥無效惟服甘連湯二三帖可安甘連湯甘草五分黃連二錢水煎服經來大小便俱出此症名曰差經因食熱物過多積久而成宜解其熱毒順其陰陽分利五苓散豬苓澤瀉白朮赤芍各一錢阿膠當歸川芎各八分空心服經來常咳嗽此症因血虛咳乃肺燥金枯急用茯苓補心湯止其嗽再服雞蘇丸除其根茯苓補心湯茯苓川芎當歸白芍各錢半生地三錢蘇葉人參前胡陳皮甘葛甘草半夏桑皮桔梗各一錢枳實八分姜三片空心服雞蘇丸川貝四兩蘿蔔子一升為末蜜丸空心白湯下五十丸經阻腹大如鼓月水不來二三月腹大如鼓人疑是孕一日崩來其血內有物如蝦蟆子其婦昏迷不知體盛者急投十全大補湯可愈體弱形瘦者死經來小便出白蟲經來血內有白蟲形如雞腸滿肚疼痛先用迫蟲丸通其蟲於大便而出後用建中散補之迫蟲丸麝香五分續隨子檳榔牽牛大戟各五分芫花一錢大黃一兩為末麵糊丸如元眼核大每服一丸酒下建中散黃耆肉桂甘草各五錢白芍一兩為末白酒調下經來吐蛔蟲經來寒熱四體厥冷大汗嘔吐蛔蟲痰氣緊滿百死無生不治經來潮熱旬日不思飲食經來胃氣不開不思飲食此症以開胃為先服鴨血酒即安鴨血酒白鴨一隻用銅刀取血乘熱調陳熟酒服室女經閉室女月水初出血海不識保養將衣服用冷水洗之水浸手足血見冷而凝不出血海面色青黃遍身浮腫人多作水腫治不效宜通經丸通其血則腫自消通經丸三稜莪朮各五錢川歸川芎赤芍各一兩穿山甲六錢芫花四錢劉寄奴三錢為末米糊丸酒下血山崩此症若初起宜服十灰散若久崩者宜服雞子湯如小腹痛則用加味四物湯十灰散宜研極細末連灰服下阿膠側柏葉各二錢棕艾綿絹各一錢胎髮三分苧根一錢百草霜三分白茅花根一錢俱燒灰存性為末白湯調下吳按若無胎髮可用無油頭髮雞子湯雞子或云落袋子五個蔥三根姜一兩共搗爛如泥入麻油鍋內炒酒淬去渣熱服
