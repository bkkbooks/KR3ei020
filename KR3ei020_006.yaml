body:
  text: 卷六産後便覽産後七日內未服生化湯塊痛未除可用生化湯以清塊痛即三日內已服生化湯二三帖塊痛猶未除仍可再服幾帖其塊痛自除産後七日內未可輕用參朮黃耆恐塊痛不止若氣血虛脫或暈厥或汗多而厥或形色脫口氣漸冷或煩渴不止或氣喘急脈脫皆危急之症亦須從權多用參耆生化湯以救之如服後病有生機又當減去參耆只服生化湯以消其塊痛俟塊痛已止再用參耆暑月産婦服生化湯本以消塊痛若腹失蓋護雖服生化湯塊痛終不消止産婦大便八九日不通此血少腸燥也宜用生化湯加麻仁以通潤之服歸芎以斤數自然通順矣若虛甚並加人參一二錢慎勿用大黃等藥以下之産後一二日內已服生化湯二三帖腹仍痛然可揉按而止者此虛也宜生化湯加人參二三錢吳按若拒按者實也宜用加味生化湯又産後七日內感寒冷物血凝作痛宜生化湯加肉桂四五分及至半月外或一月以上則服四消丸及補中益氣湯産後危症從權用參以救也若系肥人多痰或暴怒卒中只宜生化湯加竹瀝薑汁産畢血暈速服大料生化湯神效若實由稟弱或胎前虛症所致故産後倦厥服生化湯一帖後即宜加人參一二錢連進兩帖可救至或身熱汗出氣促咽塞神昏不舒及胎前瀉産後不止昏倦等症可於生化湯二帖加人參一錢以救急産後血崩暈倦厥去如身心溫暖即挖開産婦口灌加參生化湯如不下咽用鵝毛插入喉中漸漸灌之灌下腹漸熱藥不拘數帖方可活産後血崩氣脫煩躁不寧目瞑似邪語言不正速服生化湯頭煎後即服定志養榮湯毋信邪以驚之此所謂挾血如見鬼也産後手足冷厥或口燥大渴乃大虛危症須大補以回生如服加參生化湯後猶渴必用人參麥冬散作茶服産後日久不食服藥即吐用人參一二錢加薑二三片陳米一撮另用新罐煎服以安胃氣凡産後諸危症一日夜內連服藥三四帖乃可若照常法服藥豈能接將絶之氣救已急之危耶吳按生穀芽灶心土煎化茶亦效産後厥産後手足冷厥發由陰氣虛陽氣亦虛故也經曰陽氣衰於下則為寒厥厥氣上行滿脈去形蓋逆氣上滿於經絡則神氣浮越去身而散也加參生化理中湯川芎一錢當歸人參各三錢薑炭炙甘草各五分黃耆一錢水煎服服後厥回痛塊未除暫減參耆俟塊痛已除仍用參耆加桃仁十五粒薑水煎服如渴加人參一錢麥冬一錢五味子十粒手足微冷加熟附子五分痰加橘紅五分竹瀝半杯薑汁二匙汗多加黃耆一錢血塊痛加肉桂五分虛甚加人參一二錢大便不通加麻仁一錢五分再服五仁丸慎勿用承氣湯至如熱厥不可用白虎湯寒厥不可用四逆湯蓋産後厥症氣血兩虛多脈脫用藥必須大補少佐薑附以回陽也産後諸症俱用生化湯加減如前條兼症藥味附載者後有兼症可仿而用之下不備載産後氣短汗喘痰嗽聲重産後氣短似喘非喘氣不接續或兼熱或兼痰或痰熱俱兼皆危急症也治當大補血氣雖有風寒之邪而兼頭痛發熱之症惟當重産專門治傷寒者慎勿發散丹溪云産後切不可發表是也加味生化湯川芎棗仁各一錢當歸一錢五分薑炭四分炙草五分桃仁十五粒人參二錢如虛脫厥去再加人參一二錢棗湯煎服如脈與形脫將絶加人參三四錢頻灌救如汗不止加人參麥冬各一錢汗多痰甚加人參三錢竹瀝半杯薑汁三匙杏仁十粒汗多喘嗽聲重加桔梗杏仁各五分無汗喘嗽加半夏一錢杏仁十粒桔梗五分汗不止三四帖後加黃耆一錢如産後汗出氣短加參生化湯川芎當歸人參各三錢桃仁十粒棗仁炒一錢浮麥一撮麻黃根五分煎服胎後氣短痰嗽聲重汗出二加生化湯川芎一錢當歸三錢炙甘草四分杏仁十粒棗仁炒一錢桔梗四分人參二錢半夏一錢水煎服凡産後汗多氣喘氣短出言懶倦之甚是氣血虛脫速服上方外須用醋炭以防暈加味補中益氣湯此方須服生化湯三帖之後血塊不痛者用人參二錢當歸三錢炙草五分川芎一錢陳皮三分黃耆八分山藥麥冬各一錢如小便不行加茯苓八分切忌用豬苓澤瀉木通等藥産後頭痛發熱氣急喘汗産後頭痛發熱氣急喘汗或喘甚者是氣暴竭或坐起久勞所致宜生化湯加人參治之勿視為氣實發喘誤投降氣順氣之藥加參生化萬安湯川芎二錢當歸三錢人參二三錢炙甘草五分廣皮三分杏仁七粒如在七日內加黃耆三錢棗仁二錢麥冬一錢夫産後汗喘危症也人皆以參為助喘而不敢用致莫救者不少今加於芎歸湯內萬安無失又有一等庸醫即或用參而多加陳皮枳殼以監製之反從耗散切不可信寧獨參湯可保萬全血虛極産畢即汗産後血虛之極産畢即汗宜服生化湯二三帖消塊痛後服下方調衛止汗湯黃耆麻黃根各一錢當歸二錢炙草五分防風三分人參一錢五分虛甚加桂枝四分七日外減桂枝勿用如汗多而渴當回液生脈加麥冬一錢五味子十粒汗多小便不通津液不足毋用利水藥有痰毋用半夏生薑只可用橘紅四分産後氣血竭汗多形色脫産後氣暴竭虛汗濈濈然出形色俱脫此危急症難拘常法先定塊痛從權速服調衛參耆湯二三帖救之待産婦少有精神如塊痛未除減去參耆調衛參耆湯黃耆一錢五分人參三四錢麻黃根當歸各一錢甘草炙五分防風二分桂枝五分汗少去桂枝多加人參如塊不痛加棗二枚口渴禁用半夏生薑寒熱往來毋用柴胡等藥頭痛發熱毋用麻黃黃芩黃連黃柏等藥蓋産後汗多當作亡陰論陰亡則陽隨而亡急服上方或可保全産後氣短似喘産後氣短似喘氣血猶未竭補劑可少緩速服生化湯一二帖以行血定痛然後加參若産時甚勞及血大崩形色又脫而喘急不特急服加參生化湯並且於一時速服兩帖如遲而照常一帖死亡立至若醫者作痰火症治而誤用枳殼青皮貝母香附黃柏黃連等藥不知誤死多少矣加味生化補中益氣湯川芎一錢當歸三錢乾薑四分炙草五分人參三錢桃仁十二粒茯苓一錢如汗多不用茯苓加黃耆一錢五味子十粒若日久食少聞藥即吐及誤用寒藥食寒物以致嘔不納穀者急用人參二三錢薑三片倉米一大撮用新罐煎服如汗多氣短氣喘不受補者此虛甚之極不治産後汗多口噤筋搐類傷寒産後汗多項強口噤牙緊筋搐類傷寒症慎勿作傷寒治難經云汗多亡陰陰亡則陽隨而亡故曰汗多無陽産後血脫多汗亡陰陽此危症也三加生化湯川芎六分當歸三錢黃耆麻黃根天麻棗仁各一錢人參二錢甘草荊芥各四分防風三分棗三枚煎服如脈脫再加人參二三錢附子四五分忌食薑蔥煎炒生冷如身熱毋用風藥並勿用芩連梔柏小便不通因汗多亡液毋用利水藥並毋用小續命湯愈風湯即半夏南星亦宜少用毋信用邪術法尺符水等事産後崩脫暈厥産後血崩氣急氣脫昏亂將絶或暈厥牙緊速煎清神返魂湯灌之如氣將絶灌藥不下用鵝毛管插入喉中以酒杯盛二三分灌之灌下腹漸溫暖不拘帖數可活又須另用一人以熱手從産婦單衣上由心揉按至腹下數百次清神返魂湯川芎二錢當歸四錢炙甘草五分人參一錢荊芥乾薑各四分桃仁十粒肉桂五分棗二枚水煎服如兩手脈伏右手脈絶加麥冬一錢五味子十粒灌醒後塊痛未除減去參等仍服生化湯俟塊痛已除再加人參黃耆若血塊已消減去桃仁肉桂若瀉加伏苓三錢此危症須一日一夜內服二三帖可保終吉産後崩泄産婦日久血崩不止或如雞子大或成片治宜大補脾胃升舉氣血消平心火之藥升舉大補湯並治老壯婦人血淋白朮三錢人參熟地各二錢當歸二錢五分黃耆一錢炙甘草五分升麻荊芥白芷陳皮黃連炒黃柏炒羌活各四分防風三分如泄瀉加澤瀉五分蓮子十粒減去黃柏如白帶加半夏蒼朮各一錢産後脾泄不止參耆蓮子湯並治日久不止脾泄症人參二錢白芍酒炒八分白朮二錢當歸一錢五分蓮子十二粒去心薑二片煎好取藥內蓮子送藥大忌房勞火動年久脾泄者須百餘帖甚者肚痛加薑炭五分虛甚加人參二三錢血崩脾泄症服此方活人多矣但雖有熱忌用梔柏芩連産後瀉産後脾胃虛産畢即瀉必先服生化湯一帖第二帖內加茯苓一錢肉果一個麵包煨熟去面用訶子皮一錢去油蓮子十粒薑一片煎服兩帖後不止加人參一二錢小便不通因瀉亡津液切勿用利水藥産前久瀉産後不止産婦虛脫從權服下方以扶其虛若塊痛不止俟脫稍減去人參肉果以除塊痛加味參苓生化湯川芎一錢當歸二錢乾薑甘草各五分茯苓一錢五分山藥一錢肉果一個麵煨熟訶子皮一錢去油蓮子七粒人參二錢糯米一大撮虛甚多加人參産後七日外血塊尚痛亦服此方血塊不痛加白朮二錢陳皮三分瀉兼熱毋用梔柏芩連有痰毋用半夏栝蔞瀉兼渴用生脈散以回津液産後赤白痢産後七日內患赤白痢後重頻仍最為難治欲調氣行血推蕩痢邪猶慮産後之元氣虛弱欲滋榮益氣大補産虛又恐助邪痢之初盛其行不損元氣補不助邪惟生化湯去炮薑加木香順氣則並治而不悖再服加味香連丸以候一二日視病勢加減可保無虞若患褐色後重頻仍丹溪纂要內有方論若産婦素厚産及一月可用驅蕩之方及芩連性寒之藥若産婦素弱雖産後月餘未可峻劑以行積再禁口痢摘刊奇方中自有治法慎毋按古方用厚朴枳殼以治産痢宜用香連丸代之香連丸方在續集四加生化湯川芎二錢當歸四錢甘草四分桃仁十粒茯苓一錢陳皮五分木香三分水煎熟去渣送香連丸三十粒如産後已服生化湯二三帖産婦精神甚好可服芩連芍藥之類若大黃等藥決不可用産後半月患痢後重加連生化湯川芎二錢當歸三錢白芍酒炒一錢黃連薑汁炒六分枳殼五分甘草四分茯苓一錢木香三分加紅糖煎服産後患血痢久不愈屬陰虛宜四物湯加人參産後瀉痢已論立方大率因初産氣血暴竭必用生化湯加減未曾論産後瀉痢多由飲食傷脾而得故重出治法方症然必先服生化湯行塊止痛後可用後方耳産痢黃色乃脾土真氣虛宜補中益氣湯加木香肉果久痢元氣下陷大便不禁肛門如脫宜六君子湯加木香肉果乾薑傷麵食宜六君子湯加麥芽停谷宜六君子湯加神麯停肉食宜六君子湯加山楂四個砂仁四分神麯一錢胃氣虛弱瀉痢完穀不化宜溫助胃氣六君子湯加肉果一個木香四分胃氣虛脾氣弱四肢浮腫宜補中益氣湯合五皮飲五皮飲陳皮桑白皮大腹皮茯苓皮薑皮各一錢吳按亦有以五加易桑白者更妥諸症兼嘔吐加藿香兼痰加半夏八分兼小便短澀加茯苓一錢澤瀉五分燈心三十支瀉久不止加蓮子十粒赤痢血多加薑砂木香之類然不可多用恐熱則愈行久痢不止加人參一錢黃連一錢同煎服産後嘔不納穀産後胃氣不和嘔吐不止全不納穀在七日內血塊未除當重消塊佐以溫胃安胃行血湯川芎人參各一錢當歸二錢乾薑砂仁藿香各四分炙甘草五分桃仁十粒薑一片如有汗不用薑七日內外已服生化湯三四帖血塊不痛嘔吐不納穀加味六和湯川芎一錢當歸扁豆各二錢乾薑豆蔻各四分甘草三分人參茯苓各一錢藿香三分山藥一錢五分陳皮三分薑一片煎服嘔止後減去豆蔻吳按扁豆宜用殼産後嘔吐服前二方而胃和嘔止痛止但氣血不行食少調中和胃湯人參白朮當歸扁豆各一錢茯苓二錢甘草陳皮乾薑各四分山藥一錢五分煎服
