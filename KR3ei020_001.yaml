body:
  text: 卷一脈法左手寸脈洪主胸中之怒氣關脈洪主胸中之冷尺脈洪主腎虛左三指脈一般大主孕有孕在內尺脈細如絲髮主作脹女人血室病月水或前或後右手寸脈洪主上焦熱咳嗽有痰身發潮熱關脈洪主冷氣作痛尺脈洪主孕尺脈小主子宮冷兩手六脈一般洪緩而清利主壽高六脈俱小如線大主脾胃弱不能飲食腰痛頭痛頭暈敗血六脈俱洪大浮弦主有瘋氣女人除此併産後余與男子同男子左手脈洪右手弱主大利女人右手脈洪左手弱主大利辨男女脈法左手實大是男胎右手弦洪女孕來兩尺偏大分男女命門滑實主懷胎調經趲前為熱退後為虛血滯宜破血枯宜補時常經前作痛為血積經後作痛為血虛當時發熱為血虛有積經後發熱為血虛有熱主意婦人坤道血如期氣血調和體最宜血盛氣衰應可治血衰氣旺漸乖違血熱先期風熱紫寒痰黃淡濕違期作痛行經氣血滯行過作痛氣血虛經血欲調宗四物溫膽枳朮二陳推脈數黃芩荊芥穗氣虛力弱用參耆沉遲氣滯檳榔佐作痛滿悶入青皮虛熱逍遙補心類清其經血自如期經閉夫經閉不通或墮胎及多産傷血或久患潮熱消血或久發盜汗耗血或脾胃不和食少而不生血或痢疾腸風失血或七情傷心氣結鬱結致血閉而不行也治宜生血補血調血主意經凝氣滯不流通啓閉將來紫淡紅病後汗多思損血或因濕熱冷兼風氣鬱沉微當利氣緊寒積血又疏通四物檳榔附莪朮桃仁牛膝桂虻蟲弦濡氣虛參白朮黃耆甘草牡丹芎其間胃火乾枯涸酒佐將軍大有功崩漏皆由勞傷氣血損任沖二脈氣血俱虛不能約制其經血故血漏下或漸成淋漓蓋婦人多由心事不足或伏事人少或故貴勢衰先富後貧致心火上炎治當勸諭而行鎮壓心火之藥主意崩漏皆由氣血傷脈來弦細大而長東垣下陷不言熱學者須知要忖量丹溪要論虛濕熱陽搏陰弱病之詳脈弦而數當清熱荊芥黃芩末服良百草霜研宗四物痛入元胡炒黑薑脈濡氣弱參白朮續斷防耆功效強久崩下陷宜升舉養血調脾瀉二陽赤白帶赤屬血白屬氣濕熱為病漏為帶俱是胃中痰積下流滲入膀胱稠黏者是又有如白湯者名曰白濁主燥濕為先法當升之甚用吐法以提其氣宜斷厚味主意白帶根因濕熱多赤由營衛不調和來時骨膝皆痠痛漏若多時真水磨脈弦而緩傷風火炒薑梔子絶其疴伏龍肝散多靈驗脈數樗根效如何伏龍肝散伏龍肝艾葉川芎各一錢五分赤石脂麥冬各四分乾薑五分川歸三錢肉桂一錢甘草熟地各二錢棗二枚煎服或為末米湯送或酒送安胎胎氣宜清不宜熱宜靜不宜動有因胎病而母不安者有因母病而胎氣不安者宜詳察之主意妊婦全憑氣血偕傷情冷熱便為災傷血脈濡宜四物四君脈大漸安排挫氣縮砂為末服芎歸苓朮不傷胎安胎散當歸川芎白芍熟地各二錢白朮茯苓黃耆炙甘草阿膠蛤粉炒地榆各錢半半夏一錢艾葉三分薑三片研末米湯調送吳按半夏礙胎宜少用為妥脾氣虛弱者六君子湯加枳殼一錢紫蘇六分薑二片棗五枚胎氣鬱滯者參蘇飲參蘇飲人參二錢蘇葉五分煎服鬱結傷脾者歸脾湯歸脾湯人參黃耆茯苓炙草各二錢木香八分白朮棗仁元眼肉各二錢加柴胡砂仁各等分薑一片煎服鬱怒肝脾傷者四七湯四七湯薑炒厚朴茯苓蘇葉各一錢薑夏一錢五分加川芎川歸各二錢薑二片棗二枚煎服怒動肝火者四七湯加柴胡六分五味子四分同煎漏胎妊娠月水時下皆因衝任脈虛不能約制經血血漏盡則胎斃矣亦有勞後喜怒不節或飲食觸冒風寒或母有宿疾為風冷所乘者或氣失度而漏下者主意漏胎血少氣偏虛不能衛護熱傷之脈數黃芩加白朮安胎聖藥善扶持弱脈血虛全四物艾膠制炒要知宜下陷升提分濕熱氣虛應可用參耆胎痛夫胎痛皆娠婦不知禁忌或因生冷或觸風寒邪正相擊隨氣上下衝於心則心痛攻於腹則腹痛傷於胎則胎痛也主意胎痛分明胎氣傷致令娠婦痛聲長脈來細緊寒食氣縮砂四七最為良脈澀脈虛宜四物紫蘇香附服安祥尺數熱痛黃連炒診脈須分陰與陽惡阻由婦人稟氣怯弱或有風疾或有痰飲凡娠便是有痰其婦顏色如故脈息和順但覺肢體沉重頭目昏眩擇食惡聞氣味好食酸鹹甚者作寒熱嘔吐痰水輕者不必服藥重者以半夏湯茯苓丸可也主意血奪胃中嘔吐下一云痰火自相搏飲食下咽隨口出致令惡阻食難吞半夏茯苓湯要藥二陳藿香亦為尊脈分冷熱間虛實順氣和平胎自寧半夏湯薑半夏茯苓各二錢煨薑六分白朮杏仁陳皮白芍各錢半竹葉二十片大棗五枚煎服茯苓丸赤茯苓一兩人參五錢桂心三錢乾薑八分半夏陳皮白朮甘葛各四錢甘草二錢枳殼二錢為末密丸每日三服每服三十丸半夏伏苓湯半夏茯苓各八分砂仁陳皮甘草各四分加烏梅一枚薑二片棗五枚煎服回春方茯苓半夏厚朴蒼朮各一錢陳皮砂仁各五分炙甘草乾薑各三分藿香八分烏梅一個薑三片煎服胎腫凡娠婦有通身腫者有腳腫者俗呼為胎腫又曰胎水有脾虛不能制水血散四肢而腫者有胎挾水水血相搏者有脾胃虛濕者有乘風冷者有痢疾後而腫者有飲食太過者有腹脹而腫者治宜詳察主意腫脹皆因濕熱多山梔萊蔔炒宜過研末米稠調服下管教虛腫盡消磨子煩夫娠婦而子煩者是肺臟虛而熱乘於心則心煩停痰積飲在心胸之間或衝於心則亦煩也若熱煩者但熱而已如有痰而煩者口吐涎沫惡聞食氣則煩躁也主意娠婦心驚悶子煩病因二火在其間竹葉湯除虛燥病門冬飲子似仙丹犀角散生犀角六分地骨皮麥冬赤茯苓甘草各二錢研末水送竹葉湯白茯苓二錢防風一錢麥冬黃芩各一錢五分竹葉二十片煎服門冬飲子麥冬人參知母各一錢五味子栝蔞葛根各五分生地八分茯神七分甘草三分竹葉二十片煎服子癇孕婦忽然冒悶不省人事角弓反張須臾則蘇狀如中風名曰子癇亦謂之風症又名子冒治宜四物養血加芩連降火薑夏湯破逆主意娠婦筋強語塞痰或時發搐故名癇脈浮弦滑羚羊角煎服除風漸漸寬羚羊角散羚羊角棗仁獨活五加皮各八分防風川芎川歸茯神杏仁各四分木香甘草各三分加薑三片研末酒送子懸胎氣不和懷胎逆上脹滿疼痛謂之子懸恐難産主意胎氣湊上胸膈間滿悶脹痛曰子懸紫蘇散子安胎氣頓教一服遂安然紫蘇散蘇葉人參橘紅歸尾川芎各二錢粉草白芍大腹皮各錢半酒洗淨薑五片蔥白五寸胎前諸症俱用此方加減如腹痛加木香香附嗽加枳殼桑白皮熱加條芩嘔加砂仁瀉加白朮茯苓均研末米湯調送子淋妊婦腎虛膀胱熱也腎虛不能制水則小便數也膀胱熱則小便澀而不宣懷孕之婦胞系於腎腎間虛熱而成淋症甚者心煩悶亂名曰子淋主意子淋水聚在胞中熱結便難氣不通安榮散子殊多效服之寬快有奇功安榮散麥冬通草滑石當歸人參甘草各八分細辛三分燈心一團研末米湯水送胎死上喘因母患熱症至六七月以致臟腑極熱熏蒸其胎而至胎死不能自出故作此喘胎死母舌青者是主意脈沉病喘死胎中動熱傷胎氣上衝桂麝和勻酒調下黑神散子自然通黑神散熟地當歸白芍桂心蒲黃各三錢乾薑炙甘草各三分炒黑豆去皮二合半為末每服二錢童便和酒服難産橫生妊婦失忌或氣逆而然主意婦人氣逆胎遂橫益母童便酒下行但將神應催生散服之不久兒郎生如聖散黃蜀葵花焙為末熱湯調服二錢若漏血胎胞乾澀難産速進二帖即産若無花用子合半為末酒服催生如神胎衣不下産時用力惡血逆上胎衣亦隨氣上而悶迷須臾不下即死主意胎衣不下為如何疲倦皆因用力過停風衣冷或血入胞脹令人無奈何急服奪命丹行血牛膝湯煎效亦多益母童便酒調下胎衣下利便清和奪命丹附子炮五錢丹皮大黃各一兩乾漆炒煙盡為度為末大黃成膏丸桐子大酒下五十丸牛膝湯牛膝川芎朴硝蒲黃各三兩川歸一兩五錢桂心五錢為末和勻每服五錢薑三片生地三錢煎湯送又方牛膝瞿麥歸尾木通枳殼各一錢冬葵子酒洗一錢五分滑石二錢水煎熱服凡生産不順用此方滑利水道令兒易生産後寒熱凡發熱乃氣虛甚非有實熱也有內傷發熱者有外感發熱惡寒者乃氣血虛甚又有瘀血停滯者主意産後發熱又憎寒傷感須知有幾般外邪身熱脈浮緊五積交加疾自安右寸脈大頭必痛發熱皆因宿食存香砂二陳加麥用內傷莫作外傷看小腹滿痛有惡血憎寒壯熱掌心溫弦急脈宜五積散元胡蔥白散為尊日晡潮熱宜八物脈虛弦大補中論醫臨脈藥如臨陳虛實分明仔細尋産後血暈有去血多而暈者宜大補血有氣虛而暈者宜大補氣有痰火泛上者宜清痰降火有瘀血不行者宜清瘀血主意血暈皆由去血多血虛痰動耳鳴鑼脈體沉微如冷厥若然不治染沉疴産後中風中風不語或胎前先染風邪未發致産後失於調理而然或兼産難感冒轉成此症主意産後乘風口眼歪血虛氣弱故招來脈浮愈風湯有效濡弱弦微續命裁愈風湯荊芥穗炒為末每服三錢以炒黑豆淋酒調服童便亦可又方上方加當歸等分酒少許煎服即蘇此方加當歸七分名交加散續命湯人參麻黃黃芩白朮防己川芎杏仁甘草肉桂各一錢五分附子一錢防風一錢薑五片食前熱服宿血腫脹産婦脾胃虛弱血氣衰敗亦有傷風邪而腫者主意敗血歸脾腫脹災胎前宿食濕招來致令余血遊經絡遂使平胸氣滿懷脈沉解散調還易宿食須當琥珀開叮嚀後學宜切記莫作脾傷水氣猜琥珀散真琥珀二錢滑石三錢粉甘草一錢五分為末每服三錢燈心湯送産後腹痛若腹滿者當去惡血腹不滿者此虛痛也主意惡血不盡痛憂疑脈來細緊與沉遲聚寶丹磨隨引子童便和酒最相宜脈弦而緊黑神散血滯元胡桂與歸心滿腹痛並兒枕蒲黃宜入五靈脂聚寶丹沒藥琥珀另研當歸酒洗焙乾木香各一兩滴乳五錢辰砂麝香各一錢為末酒糊丸每服二三十丸童便送下失笑散五靈脂蒲黃各一錢醋酒煎服半産月數不足勞傷血氣而致主意半産多因是嗽生內傷寒熱暴而行東垣升舉全生劑活命湯方妙莫名全生活命湯柴胡川歸升麻白芍各二錢生地熟地川芎藁本各一錢五分防風羌活獨活葛根炙草各一錢細辛二分蔓荊子五分紅花三分水煎熱服陰戶脫氣血虛甚所以脫下但宜養氣和血腰肚常宜暖之治宜補中益氣湯或十全大補湯主意戶物形如帕下垂俗名呼作産門頽治宜補氣兼升法濁氣清時物自回惡血入心悶亂欲絶者是主意産後昏迷血入心令人顛倒失精神脈浮而滑宜續命弦脈須當用七珍七珍散人參川芎石菖蒲生地各二兩防風辰砂各五錢細辛一錢為末每用一錢薄荷湯下惡血入脾産後嘔吐不食者是主意産後因虛血入脾令人嘔吐食還希脈來弦緩多微細抵聖湯煎功效奇抵聖湯赤芍半夏澤瀉人參陳皮炙甘草各二錢生薑焙乾一錢酒水煎服惡血入肺産後惡血遊入經絡氣喘咳嗽胸膈不利主意肺喘多因惡血侵故令氣促作痰聲寸口脈來浮兼滑參蘇霹靂遂安寧惡血入肝産後手足筋脈抽搐血暈似風狀主意弦脈筋抽血入肝面瘡發怒病多般或時血暈如風狀丹皮散服遂平安丹皮散丹皮防風等分為末每服一錢溫酒或鹽湯調服
