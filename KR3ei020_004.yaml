body:
  text: 卷四原經水不調一由脾胃虛損經曰二陽之病發於心脾夫二陽者陽明胃經也主納水穀長養氣血灌溉腑臟流行經絡乃水穀之海氣血之升唯憂愁思慮傷心心氣受傷脾氣失養鬱而不通腐化不行胃雖能受而謂長養灌溉者安在哉故脾胃虛弱飲食少思血氣耗衰斯有血枯經閉之症蓋血少色必淡或過期始行或數月一行矣一由衝任損傷氣以順之血以濡之故氣行則血行氣滯則血逆大抵婦人情多執拗偏僻忿怒妒忌多傷肝氣肝為血海衝任之脈衝任失守血氣妄行或女子未及二七天癸之期而男強與之合或月事適未盡而男與合縱欲不已皆致衝任內損血氣不固或為崩或為漏有一個月再行有未及期先行諸症一由脂痰凝滯肥盛之婦腸胃多痰壅滯經絡或閉經帶下以上三症皆不能孕育經水不調症形瘦多痰多郁血虛氣熱宜四物湯合開鬱二陳湯加赤芍黃芩黃連姜為引開鬱二陳湯蒼朮香附川芎各一錢青皮莪朮檳榔各七分木香五分姜引形瘦多痰且熱此衝任受傷宜四物湯加人參知母麥冬甘草薑棗引並服地黃丸空心白湯下衝任傷損腎虛血少枯閉誤服辛熱暖子宮藥致經不調衝任伏火宜四物湯加赤芍知母木通黃柏甘草食前服兼服三補丸三補丸黃芩黃柏各等分俱酒炒蜜丸白湯下性急多怒而妒氣血俱熱必有鬱症宜四物湯加柴胡酒炒黃芩黃連酒炒香附童便制空心服肥盛腸胃多痰壅滯經絡閉血帶下地骨皮湯地骨皮當歸川芎知母麥冬各一錢甘草五分空心服形瘦經不調素無他症此血熱也宜四物湯加黃芩黃連知母酒炒黃柏各等分甘草五分空心服兼三補丸過期經行症情性溫和有痰此氣血兩虛宜八物湯合青皮湯加香附兼服蒼莎丸蒼莎丸香附亦名莎草根蒼朮米汁浸炒二兩香附童便浸炒三兩條芩酒炒一兩為末神麯糊丸白湯下形瘦素無他症此血氣不足宜十全大補湯形瘦食少此脾胃虛弱血氣衰少宜異功散合芎歸湯加人參白朮茯苓甘草陳皮薑棗引食前服兼地黃丸芎歸湯川芎歸身香附枳殼炒各一錢五分滑石二錢姜引肥胖飲食過多此濕痰壅滯軀脂逼迫宜六君子湯合芎歸湯加香附薑棗引空心服一月經再行症性躁多氣傷肝而動衝任之脈宜四物湯加人參柴胡黃芩黃連甘草空心服兼用知母黃柏為丸滾湯下性躁多氣傷肝而動衝任之脈誤服辛熱藥致經再行可照上服藥更服三補丸數月行經症形盛多痰氣虛宜六君子湯合蒼莎丸加川芎當歸枳殼食前服蒼莎導痰丸亦在食前兼服蒼莎導痰丸蒼朮香附枳殼各二兩陳皮茯苓各一兩五錢膽星甘草各一兩為末薑汁和神麯為丸淡薑湯下形瘦脾胃弱氣血虛宜十全大補湯經期或前或後症脾胃虛弱氣血不足宜從虛治服加減八物湯兼烏雞丸加減八物湯人參三錢白朮茯苓炙草各五錢白芍歸身陳皮香附丹皮各一錢食前服烏雞丸專治脾胃虛弱衝任傷損氣血不足經候不調凡無子者服之神效白毛烏骨雞未鐓雄雞者一隻約重一斤以粳米餵養七日勿令食蟲蟻以繩縊死干撏去其毛酒洗淨內雜不用納生地熟地天冬麥冬各二兩於雞肚內以好𩽴魚酒十碗熬爛即出肚內藥將雞用桑柴火連骨焙乾仍以前生地等藥酒又浸又焙至雞骨肉枯為末吳按此酒不知出處只用無灰陳米酒亦可人參五錢蓯蓉酒洗焙故紙炒砂仁歸身白朮川芎丹參茯苓杜仲鹽水炒炙甘草各一兩香附醋浸四兩為末入上雞骨肉末和勻酒麵糊丸空心酒下或米湯下五十丸行經腰腹作痛症氣滯血實人瘦有火宜桃仁四物湯加條芩黃連桃仁四物湯歸尾赤芍川芎生地香附各二錢丹皮紅花元胡各一錢桃仁十一粒臨服研入空心服氣滯血實人肥多痰宜桃仁四物湯加枳殼蒼朮半夏經後腹痛症此虛中有滯宜八物湯加木香香附青皮薑棗引食前服經水多少症形瘦經少此氣血弱宜四物湯加人參香附甘草薑棗引肥胖經少此痰凝經隧宜二陳湯合芎歸湯薑棗引經來多不問肥瘦皆屬熱宜四物湯加黃芩黃連知母黃柏甘草姜為引兼服三補丸吳按此條不盡然宜以脈症為憑驗經色症經水色紫者熱也宜四物連附湯四物連附湯歸尾赤芍香附各二錢黃連丹皮甘草各一錢食前服經水色淡者血虛也宜八物湯加黃耆香附姜為引兼服地黃丸浮腫症因經閉敗血停積五臟流入四肢作浮腫者不可誤認水氣宜調其經經調則腫消矣然煎藥必須十餘服則下次無愆期之患至丸藥更宜久服庶疾無反覆調經湯川芎七分當歸生地益母草各一錢白芍香附丹皮茯苓各八分甘草三分姜三片棗一枚空心溫服如血熱先期及血熱過期紫黑成塊等症加黃連七分酒炒血寒過期加煨姜肉桂各三分臨期正行作痛加元胡青皮各八分臨行續斷不來積塊刺痛加紅花蘇木桃仁各五分經水過多加黃芩一錢蒲黃炒八分經來飲食不思加白朮八分陳皮砂仁各五分肥人多痰赤白帶下加南星蒼朮各八分氣虛血弱四肢虛軟面無顏色加人參黃耆各五分此方調理之大概如有兼症可照方隨機加減用之金匱丸香附童便制酒醋鹽水各分制共四兩沒藥六錢棗皮焙去油當歸童便制茯苓白朮米泔水浸白薇洗去蘆阿膠蛤粉炒白芍各四兩生地酒浸洗用益智仁二兩以酒同炒去益智仁淨八兩人參二兩川斷酒洗五倍子炒淨六兩黃芩酒浸洗淨四兩砂仁炒去衣二兩上藥法制為細末用山藥十二兩為末水打丸空心白湯下五十丸吳按棗皮即山茱萸原經水不行脾胃傷損飲食減少氣耗血枯而不行宜補脾胃養氣血氣充血生經自調矣切忌用通經藥恐傷中氣陰血已乾誤成癆瘵則不治矣思慮惱怒怨恨氣鬱血滯而不行宜開鬱行滯苟以為虛而用補則氣得補而益結血益凝至成癥瘕腫痛者有之矣軀脂迫塞痰涎壅盛滯經而不行宜行氣導痰則經自行矣經閉不行症脾胃傷損氣血不行加減補中益氣湯人參三錢黃耆炙白朮土炒白芍酒炒歸身川芎陳皮各一錢柴胡七分炙草五分加神麯麥芽炒各五錢薑棗為引兼服烏雞丸氣鬱血閉不行宜服開鬱二陳湯兼四制烏附丸四制烏附丸香附一斤分四主醋酒童便鹽水各浸三日三夜以砂罐煮乾所浸之水研細末天台烏藥半斤同附制研細末和勻醋糊丸軀脂迫塞痰涎壅盛滯經不行宜服蒼莎導痰丸兼開鬱二陳湯去莪朮加枳殼偏房寵妾寡婦並愆期未嫁室女欲動不得遂恨積不得伸亦有經閉之症害羞難對人言致成癆瘵宜服四制烏附丸及參朮大補之劑攻補兼行可療七情變症經閉骨蒸作熱而脈虛難治加減八物柴胡湯人參三錢茯苓白芍地黃知母麥冬柴胡各一錢炙甘草五分食遠服如有汗加丹皮淡竹葉如熱甚此方不平加炒黑乾薑一錢經閉發熱咽燥唇乾而脈實四物涼膈散歸身川芎赤芍生地各二錢黃芩酒炒黃連酒炒連翹桔梗各一錢薄荷甘草竹葉各七分煎服此方凡血實形盛脈有力者及有熱者宜服陰虛血弱火甚水虧而經閉忌用毒藥柏子仁丸柏子仁炒另研牛膝薄荷各五錢澤蘭葉川斷各二兩地黃三兩為末蜜丸空心米湯下兼服澤蘭湯澤蘭湯澤蘭葉五錢當歸一錢甘草五分空心服按靈樞經婦人有石瘕腸覃二症俗醫不識故特表而出之石瘕症石瘕症因行經之後寒氣自陰戶入客於胞門以致血凝月經不行而腹漸大如懷胎狀其婦壯盛或半年之後小水長自消若虛弱婦必成腫症溫經湯歸尾川芎赤芍肉桂桂枝莪朮醋炙故紙鹽水炒小茴牛膝各二錢甘草三分姜引兼服四制烏附丸腸覃症腸覃症亦行經時寒氣入陰戶客於大腸以致血凝經雖行而血少其腹漸大亦如孕狀俗呼漏胎如壯盛婦半年自消若弱虛婦人必成脹滿桂枝桃仁湯桂枝檳榔白芍生地枳殼炒各一錢五分炙甘草五分桃仁二十粒研泥薑棗為引空心服治崩漏次第凡治崩漏先止血以塞其流次清熱涼血以清其源後補氣血以復其舊如不清源則滔天之勢不可遏清源而不復舊則孤孑之陽無以久立必本未兼舉前後不紊乃可治之要之崩疾皆因中氣虛不能收斂其血加以積熱在裡迫血妄行故血暴下為崩崩久不止遂成為漏脈訣云崩中日久為白帶漏下時多骨髓枯是也崩漏症崩漏初起宜先止血所謂急則治其標也加味四物湯歸尾生地川芎赤芍各二錢白芷荊芥炒甘草各一錢空心服兼服十灰散十灰散藕節艾葉柏葉棕櫚大小薊丹皮山梔胎髮乾薑俱燒灰存性去火毒合勻為末每服二錢用上加味四物湯調送以血止為度吳按胎髮難覓即用無油發亦可崩漏止後宜服清涼之劑以除熱清源地黃湯生地歸身川芎各二錢黃芩黃連知母黃柏藁本柴胡羌活防風荊芥各一錢細辛蔓荊升麻紅花各六分甘草八分姜引空心服或用下加味四物湯亦可加味四物湯生地川芎當歸白芍各二錢阿膠炒艾葉條芩各一錢姜引如血未盡再兼服十灰散崩漏止後裡熱已除宜補氣血以復其舊宜服補中益氣湯加白芷茯苓黃柏知母生地薑汁少許大棗引補中益氣湯人參三錢炙黃耆炒白朮酒芍歸身川芎陳皮各一錢柴胡七分炙草三分煎服如氣滯作痛加青皮香附木香各等分或用五靈脂炒煙盡一錢為末溫酒送亦能止滯氣痛久崩成漏遠年不休此中氣虛下陷下元不固宜服補中益氣湯兼鹿角霜丸鹿角霜丸鹿角霜歸身茯神龍骨煅阿膠蛤粉炒柏子仁炒香附酒炒山藥各二兩川芎川斷各一兩炙草五錢為末醋糊丸空心服又崩有系衝任之氣虛損不能約制經血者宜大補氣血養其脾胃少加鎮墜心火之藥以治其心補陰泄陽崩自止矣若經妄行或吐血腥者用四物涼膈入生韭汁服然必先服五積散一二帖次服五苓散及各順氣去舊生新藥自然愈矣蓋崩乃經脈錯亂妄行若先用急斂之方恐有積聚凝滯之患原赤白帶婦人患帶者最多赤者屬熱虛而兼火白者屬濕虛而兼痰治法總以補脾為主又兼升提然大抵瘦人多火患赤帶肥人多痰患白帶醫人於此亦宜詳審不可執一而混施也赤白帶症形瘦多火因虛兼熱患赤帶宜四物芩連湯加升麻丹皮兼服三補丸吳按帶有五色乃因人之寒熱而變化形肥多痰因虛兼濕患白帶宜六君子湯加升麻柴胡蒼朮姜引兼服蒼莎導痰丸附孕婦白帶芩連芷柏丸蒼朮條芩各一兩黃連黃柏各五分白芍白芷椿白皮山茱萸各四錢為末酒丸開水送帶久不止以補為主宜十全大補湯去地黃加陳皮半夏煨姜更服參朮大補之劑以補脾胃之虛又服補宮丸以固下元之脫補宮丸鹿角霜茯苓白芍各一兩白芷山藥各六錢龍骨煅赤石脂各四錢童便煅碎煨姜二錢為末醋糊丸空心米湯下按婦人又有白淫白濁二症與帶症似是而實非者白淫症白淫者時常隨小便而來渾濁如米泔此胃中濁氣滲入膀胱而成加味二陳湯陳皮茯苓白朮甘草蒼朮制各一錢升麻柴胡各四分益智仁鹽水炒一錢姜引一方有香附一錢木香二分白濁症白濁症時常流出清冷稠黏或於小便後來亦不多此乃下元虛損精不能攝因滑而出分清飲川萆薢益智仁去殼鹽水炒烏藥茯苓各二錢石菖蒲去毛炒枳殼生草各一錢水煎乘熱入鹽少許服
