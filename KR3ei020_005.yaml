body:
  text: 卷五保胎法保胎第一宜絕欲為主其次寡欲然絕欲者難苟能寡欲則心清胎氣寧謐胎安而產易雖嬰兒亦可少病而多壽宜小勞勞則氣血流通筋骨堅固胎在腹中習以為常雖微閃挫不至壞事然非孕後方勞正云平日不宜逸耳宜以布纏腰當婦人孕已知覺用布一幅闊六七寸長可橫束腰間兩轉者常束腰間直至臨盆方解蓋胎當未長成得此腰膂有力偶或僕跌不至損胎及臨盆解開腹中乍寬胎兒轉身亦易宜謹飲食苟忽略不知避忌傷胎甚易大約宜淡薄不宜肥濃宜輕清不宜重濁宜甘平不宜辛熱宜溫補不宜耗散食物不能備述總在臨時酌其物情而已宜忌諸事凡七情六慾運磚弄石勞神用力嚴寒酷暑上高下低換房移床並勿入產婦房勿到喪服家勿進鬧熱場勿早起晚寢勿用婦人良方勿飲古人成方勿服過路醫生方藥宜常服藥蓋婦人懷孕則脾不運化者多脾不運化則生濕濕乃生熱故補脾燥濕之藥不可少況胎賴氣血以養孕婦恆氣血不足則必又補血順氣以安胎至若胎動漏紅以及素有半產者服藥更不可緩今撮要方列服孕後月月數帖安胎散人參川芎各五分黃芩當歸頭各七分白芍黃耆各六分白朮熟地蛤粉炒阿膠各一錢炙甘草三分食遠服如腹痛加杜仲去粗皮炒斷絲砂仁各五分有憂怒鬱結加紫蘇香附各五分以安胎氣孕後可常服金匱當歸丸川芎當歸白芍黃芩各四兩白朮阿膠各二兩人參一兩五錢砂仁一兩為末麵糊丸每服六十丸空心米湯下此方養血清熱補脾燥濕補血安胎順氣止痛且去胎毒服之臨產易生胎兒易育胎至九月後服十餘帖達生湯全當歸酒洗一錢五分川芎牛膝酒浸一宿各六分益母草不犯鐵器冬葵子炒研白朮米汁水浸炒各一錢車前子炒研細枳殼麵炒各五分大腹皮酒淨四分炙甘草三分廣木香忌火研末和服三分姜一片食遠服如腹痛加白芷沉香各五分將產催生神效催生益母丸益母草五月五日採莖陰乾不令見日忌鐵器研末半斤車前子一兩研冬葵子枳殼牛膝各五錢為末蜜丸彈子大每服一丸臨產以酒和童便化送米湯亦可如體氣不順腰痛陣痛血先行太多欲產未產加川芎當歸生地各二錢煎湯磨木香二錢入藥如虛暈加人參五分夏月熱產加滑石一錢五分甘草三分煎送冬月冷產加官桂三分煎送當漿水頻下時服施氏催生丹人參乳香焙去油各一錢辰砂五釐為末白酒送白湯亦可保產撮要產婦房中宜老成安靜者二三人坐守夏月更不宜多恐熱氣壅盛能令產母發暈宜輕言緩步不可大驚小怪宜勸安睡待時不可交頭接耳致令憂疑水溫再易涼者宜預燒紅秤錘置醋瓶以防產畢血暈宜預煎生化湯以候兒下地即服產婦第一宜慢臨盆蓋早必揉腰擦肚若系試痛則生採強取而出即或正生恐兒身未轉逼之則有橫逆之異惟忍痛以待產母手中指節或本節跳動此時渾身骨節疏解胸前陷下腰腹重墜大小便齊急目中金花爆濺此乃瓜熟蒂落之候臨盆用力得其時矣產婦切忌聽穩婆言蓋此輩惟利自圖不顧他人性命一進門來即令坐草或適當其時則誇自己手段高強如非其時欲了此適彼則生採活剝甚有逼死胎兒在腹用碎割之法以見己功藉此尚欲居奇射利以至母則受傷子則慘死禍不勝言吳按既有此輩要在我用他不可他用我臨產全賴養精神惜氣力夫欲惜力莫如安睡欲養精神全賴藥食故產婦能上床安睡務令閉目靜養即或時至何妨產下褲中能進飲食凡無大礙適意之物不妨隨意食之以壯神力如不欲飲食亦當將雞鴨肉清汁湯或補藥食勉強飲之以接神力臨產催生藥切忌兔腦鼠腎二丸並回生丹蓋兔鼠二丸例用香竄之味產時百脈解散氣血虧虛服此散氣之藥至兒出而香味未消其損多矣且令毛竅開張招風入內禍不可言若回生丹以大黃紅花為君其餘亦多消導夫產婦血已耗而又破多致產後發熱等症夫此二方古今稱為靈寶者尚如此外此更無論矣如必須用藥莫若加味芎歸湯佛手散二方頓去宿血聚生新血有益無損可稱易得而利產者也慎勿以熟方忽之加味芎歸湯專治交骨不開子死腹中當歸一兩川芎七錢龜板手掌大一片醋炙研細末頭髮婦人油發雞子大一丸瓦上焙存性水煎服佛手散治一切難產等症當歸五錢川芎三錢水七分酒三分煎服如橫生倒產子死腹中加黑馬料豆一合炒黑乘熱入水中加童便一半煎上藥服少刻再進一服無不效竹林寺真傳生化湯論產後血氣大虛理應大補但惡露未盡用補須知無滯血能化又能生攻塊無損元氣行中又得補方謂萬全無失世以四物湯理產後誤人多矣因地黃性寒滯血芍藥酸斂滯血無補故也產後惡露作塊痛名曰兒枕世多專用逍遙散然後議補又有消補混施終無成效不知舊血雖急當消化新血亦宜生養若專攻舊血則新血亦不寧矣世以濟坤丸又名回生丹用以攻塊下胎落胎雖見速效其元氣未免虧損即幸平安究非良劑不得已而用以下胞下胎只可一丸決不宜多服蓋生化湯因藥性功用而立名者也夫產後血塊宜消新血宜生若專消則新血不寧專生則舊血反滯考藥性川芎當歸桃仁三品善破惡血驟生新血佐以炙黑乾薑甘草引三品入於脾肝生血理氣五味共方則行中有補化中有生實產後之要藥也故名曰生化湯凡病起於氣血之衰脾胃之虛而產後則血氣脾胃之衰尤甚是以丹溪先生論產後曰必當大補氣血以為先雖兼他症以末治之此三言已盡醫產之大旨若能擴充其意用藥立方則治產可以無大過矣夫產後驚憂勞倦血氣暴虛諸症乘虛易入如有氣無專耗散或有食勿輕消導熱不可用芩連寒不可用桂附寒則血塊凝滯熱則新血崩流至若中虛外感見三陽表症之多似可汗也在產後而用麻黃則重竭其陽見三陰里症之多似可下也在產後而用承氣則重亡其陰耳聾脅痛乃肝腎虛惡血之停休用柴胡譫語汗出乃元氣虛弱似邪之症勿同胃實厥有陽氣之衰難分寒熱非大補不能回陽而起弱因血虛之虧不論剛柔非滋榮不能舒筋而活絡又如乍寒乍熱發作有期症似瘧也若以瘧治則遷延難愈神不守舍言語無倫病似邪也若以邪治危亡可待去血多而大便結燥蓯蓉加於生化非潤燥承氣之能通患汗多而小便短澀六君子倍用參耆茯苓必生液助津之可利加參生化頻服救產後之危長生活命屢用蘇絕谷之症頹散脫肛多是氣血下陷補中益氣之湯堪用口噤拳攣乃因血燥類風加參生化之湯宜服若產戶入風而痛甚宜用羌活養榮湯玉門寒冷而不閉洗宜蛇床萸硫磺怔忡驚悸生化遠志安神之藥似邪恍惚安神丸助歸脾因氣而滿悶虛煩生化湯加木香為佐因食而酸噯惡食六君子加神麯麥芽為良蘇木稜蓬能破惡血青皮枳殼最消脹滿一應耗血散氣之劑發汗吐下之方只可施於少壯豈宜用於產中大抵新產之後先問惡露如何塊痛未除未可遽加耆朮腹中痛止補中益氣湯無疑至若亡陽脫汗氣虛喘促速服生化加參是用權也又以陰亡大熱血崩厥暈速服生化原方乃救急也王太僕曰治下補下制以緩急緩則道路遠而力微急則氣味厚而力重故治產當遵丹溪而固本服藥法宜效太僕以加頻凡任生死之奇術須著意以救危欲俯仰之無愧用存心於愛物此雖未盡產中之詳然所聞之症皆緣近鄉治驗為據未必無小補云凡有孕婦之家照生化湯方於孕至七八月預製二三帖至產婦胞衣一破連煎一帖候兒下地於未進食之先即服其餘二帖亦相從而進不論正生小產年紀少壯服此方以消血塊生新血能保產後一切危症且長精神生化湯全當歸酒洗八錢川芎三錢薑炭五分夏令四分炙甘草五分桃仁十粒去皮尖水煎熟加陳酒六七匙於藥內服渣另貯俟三帖煎完頭煎服後合三帖渣於一處再煎服此方產後至寶如虛人見危症及熱症墮胎或產後勞甚身熱頭痛雖服過二三帖痛稍安而塊痛未除又當再製服之蓋產婦不厭藥頻況產後諸症俱以生化湯為君其餘不過隨症加減而已吳按飲熱童便最妙胞衣不下凡產母才送孩兒無力送胞或因臨盆停久外乘冷氣故血道凝澀及胎前素弱血氣洞泄皆能停胞不下治法惟速服大料生化湯二三帖使血旺腹和或兼服益母丸及鹿角灰外帖如神膏而已至如濟坤丸萬不得已而用之只可一丸若朴硝等藥產後腹內空虛服之有大害斷不可用益母丸益母草紫花者不拘多少端午日收掛當風陰乾石臼內杵末蜜丸彈子大臨服生化湯送如神膏萆麻仁二兩雄黃二錢研成膏塗產母兩足心立下胞下後速去此膏遲則腸出如至誤事速披開產母頂發將此膏敷上頂門腸即收收後亦須速去頂上之膏斷不可至再誤產後調護法凡兒下胞不下務要坐守不可睡倒先剪斷臍帶用輕物墜住胞帶頭如寒月扶產母上床倚人擁被置火櫳於被內烘之又頻用熱衣暖腹但不可使陰戶進風並頻服大料生化湯胞下後須防虛恐血暈將預燒紅秤錘投醋瓶中將瓶口包緊以瓶嘴向產母鼻孔遠遠熏之使收斂神氣解去穢氣且免暈厥產畢上床宜高枕靠墊倚人而坐切勿睡倒兩膝宜豎勿令伸直令一人以熱手從心口輕輕揉按至腹間數百次即飲熱童便一盞使閉目靜養但勿睡熟恐倦極血氣上壅能致暈厥產婦腹中時用小衣烘熱溫之雖暑月下體亦不宜蓋單被至若寒月長用火烘被內否則腹寒血塊不行且要作痛產婦惡血衝心不知人事速用韭菜切碎冬月用根放有嘴壺內以熱醋灌入密札壺口扶產婦起以壺嘴向其鼻熏之即蘇產婦七日內毋洗下部毋梳頭以勞神力毋起早以冒風寒毋行走以動筋骨至七日外可用溫水坐洗下部但須緊防產門入風月內毋多言並勞女工毋用涼水以洗手足即溫水亦宜少洗毋要驚恐毋動怒氣毋多飲食切忌房事動欲火即百二十日內不可勞神過度產後飲食較胎前尤宜知忌毋食重濁蓋以脾胃大虛必難克化即壅滯經絡使氣血不通毋食熱物使新血不寧毋食水果涼茶冷水冷物使血塊凝結毋食消導耗散物以損氣毋多飲醇酒多食鹽味以燒乾乳汁產後藥不厭頻如無怪症只服生化湯方足矣若有他症則於對症之藥加數味於生化湯之內或按集中對症服方切勿用產室百問方勿用婦人良方毋用古人成方毋用過路醫生丹方
