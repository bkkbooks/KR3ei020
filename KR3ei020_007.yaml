body:
  text: 卷七產後傷食服消食藥致滿悶產後形體勞倦雖少食亦運化羈遲胸腹欠舒故無噯酸氣味不可即投消導縱傷食而噯酸噁心惡食飽悶當於生化湯內佐消導若血塊消盡宜以參朮為主消導為佐若夫因傷諸食服消食開胃藥多反損胃氣必增虛飽滿悶多不思谷醫者又誤認原傷食物未消不敢用補助胃氣之藥多致不救予治此症用長生活命丹活人多矣長生活命丹人參三四錢水煎調鍋底飯焦末服吳按鍋底飯焦即俗名鍋粑產後類外感產後發熱惡寒頭痛毋認為傷寒太陽症發熱頭痛乍寒乍冷或兼腹痛毋認為少陽症皆由氣血兩虛陰陽不和而類外感切不可用麻黃柴胡等發汗重亡陰血即明知虛中真感風寒口傷冷物若用藥能調和營衛諸症自退矣加味生化湯當歸四錢川芎二錢姜皮四分桃仁十粒棗二枚煎溫服速服二帖若諸症未退加羌活防風各四分服之後病又不減加連根蔥四根如嘔吐加藿香三分姜一片產後服消耗藥增滿悶積久成脹凡產婦素弱臨產又勞氣血不足胸膈不舒胃雖納穀脾難轉舒若產後即服生化湯助脾強胃自無虛中之滿其產後或中滿膨脹者大率因傷食而誤用消導因氣鬱而誤用順散又因多食冷物而停惡露又因血虛大便燥結誤下而愈脹殊不知產後血氣兩虛血塊消後便當大補氣血以補中虛治者但知傷食當消氣鬱當順惡露當攻便秘當下投藥一帖不效又投一帖病者醫者不知新產婦服消耗藥多滿悶益增氣不升降溫熱助邪積鬱之久遂成膨脹醫工以為盡技病家咎於時氣又有喜食橘餅橙丁中滿助成豈知消導佐於補中湯則脾強而所傷之物自消則氣亦散助瀉兼行大便自通而惡露即行矣每見誤用消導耗氣攻下之藥以致絕穀食久者用長生活命丹而更生者百試百驗又誤用而致膨脹者仍用大補益氣之劑而不至夭折者十救八九治者毋以予言為過予蓋先用人參送鍋焦粉試引加之以救絕谷再遵丹溪醫案以救絕谷產後中氣不足中滿或噯氣虛飽及誤用耗氣順氣藥致膨脹危症救誤益氣湯人參二錢虛加二錢白朮三錢白芍神麯炒各一錢大腹皮洗陳皮各四分當歸三錢茯苓一錢五分甘草三分川芎七分如腹脅痛或塊痛加砂仁五分腹大痛加吳茱萸一錢產後大便不通誤服大黃等藥致成膨脹或腹中痛塊不止養生化滯湯川芎人參茯苓酒芍各一錢當歸四錢陳皮四分甘草香附各三分桃仁十粒大腹皮五分蓯蓉酒洗去甲一錢五分如脹甚加人參二三錢如血塊痛將藥送三消丸以上三方大率相同可通用俱遵丹溪方加減屢治屢驗然治誤服大黃必須服歸參至半斤以上大便方通腫脹漸消也丹溪三消丸治婦人死血食積痰飲等症黃連一兩五錢內一兩用吳茱萸四錢煎汁炒乾五錢用益智仁炒黃色淨用黃連吳按淨用者去同炒之藥也蘿蔔子一兩五錢炒川芎山梔炒青皮山稜醋炙莪朮醋炙各五錢桃仁去皮尖十粒香附童便浸炒一兩楂肉一兩為末和勻蒸餅為丸用上煎藥送每服五六十丸產後感風寒嗽鼻塞聲重惡寒產後七日內外感風寒嗽鼻塞聲重惡寒宜服生化湯加杏仁桔梗如有痰加花粉勿用麻黃以動汗如嗽而血塊不痛用小柴胡湯若患火嗽而聲重痰少面赤毋用涼藥大凡產婦有火併痰嗽必調理產過半月後方可用寒涼之劑若半月前還當重產丹溪云產後不可發表蓋因其虛也產後七日內外感風寒嗽鼻塞聲重加味生化湯川芎一錢當歸二錢五分桃仁十粒甘草桔梗各四分知母八分有痰加花粉姜煎服虛弱有汗嗽加人參一二錢產後半月內外患嗽有聲痰少加味生化湯川芎當歸白芍各三錢訶子皮栝蔞仁知母各一錢甘草兜鈴桔梗各四分款冬花六分姜水煎服產後虛弱百日內患風寒嗽聲重有痰或身熱頭痛無汗加參寧肺止嗽生化湯川芎知母訶子皮栝蔞仁生地各一錢當歸三錢兜鈴桔梗甘草各四分款冬花六分煎服產後類瘧產後半月內外感寒熱往來或午或日晡或夜間發寒熱其發有期其症類瘧此由血氣並弱陽虛寒作而陰虛發熱也慎勿以瘧治雖柴胡亦不可用惟調補氣血而寒熱自除矣毋用芩連梔柏以退熱毋用草果檳榔常山以絕瘧如汗氣短加人參黃耆熱加當歸人參若產已及一月其人尚虛有患瘧症則用人參養胃湯加減調理再煎參朮膏服仲景云傷寒寒熱往來一日二三度發者陰陽俱虛不可更發汗更下更吐與此意同產後半月內外類瘧加味生化湯川芎人參白朮各一錢當歸青皮各二錢甘草三分茯苓藿香各八分烏梅一個汗多加黃耆棗仁各一錢產後已及一月類瘧參朮湯人參二錢五分白朮當歸茯苓半夏各一錢草果三分甘草青皮各四分藿香五分烏梅三個水煎服再服參朮膏參朮膏白朮洗淨焙乾人參各四兩用水六碗煎汁碗半再將渣如法煎三次共取汁六碗每日服半酒杯以上藥調服或白湯下亦可產後惡露凝結成塊虛症百出產後兒下地時惡露隨下則腹無塊痛而自舒暢若腹失蓋被或傷寒涼物則惡露凝結成塊虛症百出腹脹身熱骨蒸五心煩熱食少羸瘦或似瘧或月水不行或塊在兩脅作痛腸作雷鳴嘈雜眩暈身熱時作時止等症治法當遵丹溪所云欲泄其邪先補其虛用補中益氣湯送三消丸使塊消而人不弱若消塊無補非惟塊不可消盡將食日減甚至絕谷加減補中益氣湯人參白芍黃耆各一錢白朮二錢當歸二錢陳皮甘草各四分姜三片水煎送三消丸五六十丸產後大便不通產後大便不通因血少腸燥在虛弱產婦若多服生化湯則氣旺血盛自無便澀之症治者切勿用芒硝大黃等藥下之使重亡津液便閉愈甚致成脹滿或致瀉不止者惟當以生化湯加減治之助血調腸湯川芎八錢當歸四錢桃仁十粒炙甘草五分陳皮四分麻仁炒研一錢五分如血塊痛加肉桂元胡索各五分水煎食前稍熱服氣虛汗加人參黃耆各一錢汗多而渴加人參麥冬各一錢五分五味子八粒如大便燥結十日以上肛門必有燥糞用蜜棗納入肛門其糞自化或用麻油竹管吹入肛門或用豬膽汁亦可煎蜜棗法以白蜜煎褐色成膏入水成棗產後妄言妄見產後妄言妄見由氣血大虛精奪神昏妄有所見而妄言也輕則夢中呢喃重則不睡亦語又有痰乘虛客於中焦以致五官失其職視聽言動俱有虛妄毋認邪鬼誤用符水以致不救朱丹溪云虛症有似邪祟是也屢治此症服藥多方能見效吳按痰火逆傳心胞為虛中實症急治不任攻伐緩調恐成痼疾況值產後尤以扶正驅邪消息而醫之產後三日內血塊未除患妄言妄見症服下方三四帖後加減加味安神生化湯川芎二錢當歸四錢茯苓一錢甘草四分乾薑四分桃仁十粒棗仁一錢棗二枚水煎食遠服產後三日內外血塊不痛妄言妄見此虛極之症服下方但見平穩雖未見大效候藥力充足諸症方除蓋除痛須二十帖外方見全效益榮安神湯川芎一錢五分當歸三錢茯苓人參柏子仁棗仁各一錢甘草五分龍眼肉八個陳皮去白三分竹茹四分如汗加黃耆麻黃根各一錢瀉加白朮一錢五分大便不通切忌大下發汗產後少乳產後乳汁不通或乳少通脈湯生黃耆一兩當歸白芷共五錢七孔豬蹄一對將豬蹄煮湯吹去浮油煎藥一大碗服服後被覆面睡一覺即有乳或未效再一服無不通矣若新產無乳不用豬蹄只以藥料用水和酒各半煎服體壯者加好紅花三四分以消惡露吳按黃耆當歸補血湯也再加王不留行通草葉饅頭臥時煎服乳即湧出屢經試驗產後育子乳少無錢雇乳母勉強乳子以至母子俱疲日食減少急斷兒乳連服下方參朮地黃湯川芎當歸黃耆茯苓麥冬各一錢炙草五分五味子十粒人參熟地白朮各二錢陳皮四分棗二個如發熱兼作骨蒸兼服紫河車丸驚悸有汗加棗仁五錢產後乳癰產後生乳癰未成膿栝蔞乳沒散栝蔞一個連皮搗碎當歸銀花白芷各一錢青皮乳香沒藥甘草各五分水煎服此方並治胎前乳癰吳按未潰時用蒲公英一兩酒煮搗爛先飲酒將渣敷患處屢效產後乳生癰膿出後虛弱甚十全大補銀花湯人參白朮熟地黃耆各二錢當歸銀花各三錢茯苓川芎各八分甘草五分如泄瀉加蓮子十粒肉果一個煨用產後乳生癰已破出膿寒熱往來如瘧一日一發或二三日一發不可作瘧治不可全用攻毒消癰藥亦不可用絕瘧等藥當補氣血少佐去毒之劑數品以除餘邪補中去毒散黃耆銀花茯苓各一錢人參白朮生地各二錢甘草連翹各四分當歸二錢青皮三分白芷五分烏梅一個棗一枚
