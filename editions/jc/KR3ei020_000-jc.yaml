body:
  text: 敘東坡云藥雖進於醫手方多傳於古人旨哉是言談岐黃者詎得昧所自來乎胎產之系人禍福大矣而竹林寺獨聞名於天下聞渠有秘方一帙遞相師承久而弗替惜世莫得而見之也予友陳子秉元自言其祖昔寄居竹林與寺僧最厚嘗乘閒取其秘本數卷以歸予曾向陳子借錄而陳子未之許也今年春陳子館於郡城之清道橋予往候之陳子他適啟其笥曩所謂胎產秘本在焉亟攜回抄錄數日而還其原本陳子猶未知也嗟乎竹林不肯以傳之人者陳子之祖計而得之陳子不欲以授之乃祖者示好友而予錄而歸之於以知物苟有濟於人不容終秘大抵如斯矣顧予不知醫且所錄系陳氏家藏真贗尚未可定又其間方症恐猶未備行將詣善於女科者別白而校正之如果系良方當設法傳流表予濟世之微衷云爰志其自來於上敘余孩提時聞嫂氏數小產而不能成孕諸藥罔效家大兄往竹林寺取藥數服而後有孕竟得十月滿足而生男其時因心知竹林寺女科之名後又聞張姓戴姓之女婦得奇疾皆往竹林取藥而愈始知竹林寺女科師弟相承其來已久秘方不傳之世其視病或說病原彼不立方但包藥以應是以人亦不知其方今年秋暮余偶至襟丈樊元圃家元圃知余能視藥書謂余曰兄亦知竹林寺之女科乎我有抄錄秘本曷為我校訂之余聞之色喜即閱其書見條分縷晰立案用方與世不同雖用藥或有過不及之處然望之令人了了真女科之秘要因袖歸而抄錄之抄竟並志余欣幸之意乾隆癸丑孟冬望後二日茶垞吳煜書於清暉書屋
