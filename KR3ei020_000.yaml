body:
  text: 敘東坡云藥雖進於醫手方多傳於古人旨哉是言談岐黃者詎得昧所自來乎胎産之系人禍福大矣而竹林寺獨聞名於天下聞渠有祕方一帙遞相師承久而弗替惜世莫得而見之也豫友陳子秉元自言其祖昔寄居竹林與寺僧最厚嘗乘間取其祕本數卷以歸豫曾向陳子借録而陳子未之許也今年春陳子館於郡城之清道橋豫往候之陳子他適啓其笥曩所謂胎産祕本在焉亟攜回抄録數日而還其原本陳子猶未知也嗟乎竹林不肯以傳之人者陳子之祖計而得之陳子不欲以授之乃祖者示好友而豫録而歸之於以知物苟有濟於人不容終祕大抵如斯矣顧豫不知醫且所録系陳氏家藏真贋尚未可定又其間方症恐猶未備行將詣善於女科者別白而校正之如果系良方當設法傳流表豫濟世之微衷云爰志其自來於上敘余孩提時聞嫂氏數小産而不能成孕諸藥罔效家大兄往竹林寺取藥數服而後有孕竟得十月滿足而生男其時因心知竹林寺女科之名後又聞張姓戴姓之女婦得奇疾皆往竹林取藥而愈始知竹林寺女科師弟相承其來已久祕方不傳之世其視病或説病原彼不立方但包藥以應是以人亦不知其方今年秋暮余偶至襟丈樊元圃家元圃知余能視藥書謂余曰兄亦知竹林寺之女科乎我有抄録祕本曷為我校訂之余聞之色喜即閲其書見條分縷晰立案用方與世不同雖用藥或有過不及之處然望之令人了了真女科之祕要因袖歸而抄録之抄竟並志余欣幸之意乾隆癸丑孟冬望後二日茶垞吳煜書於清暉書屋
