body:
  text: 卷二胎前惡阻胎前吐逆不思飲食腹中作痛此胎氣不和因而惡阻宜用和氣散去丁香木香一帖可愈和氣散陳皮桔梗厚朴小茴益智藿香各八分砂仁五分蒼朮四分甘草三分丁香三分木香五分胎前潮熱氣痛此症乃受熱毒而致宜服五苓散去肉桂二三帖可愈五苓散豬苓二錢澤瀉錢半茯苓白朮各三錢肉桂三分水煎溫服胎前寒熱胎前發瘧後小腹作痛口燥咽乾乃受熱也多吃生冷陰陽不分故成此症草果飲草果一個青皮柴胡黃芩各八分甘草三分空心煎服孩兒攻心胎前孩兒攻心不知人事此過食椒薑雞熱毒物積在胎中譬如六月人蓋絮被受熱難過手足亂動攻上心胞母不能安也宜用調中和氣散同勝紅丸通利二三劑母子俱安調中和氣散大黃石膏各一錢檳榔枳殼黃芩知母各六分黃連六分柴胡三分黃柏五分空心服勝紅丸紅花子去油十粒百草霜一錢為末早米糊丸蔥湯下七丸胎前氣急不得臥此乃過食生冷兼有風寒中胃肺經因而生痰氣急紫蘇安胎散紫蘇枳實桔梗大腹皮貝母知母當歸各八分五味子甘草石膏各三分桑白皮八分研末沖服胎前咳嗽此食生冷又食椒姜沖損胎氣胃火勝方作此嗽五虎湯蘇子陳皮知母桔梗各八分杏仁石膏枳實各一錢麻黃四分五味子甘草各三分煎服胎前衄血胎前衄血常從口鼻中來此因母傷熱物血熱則亂行沖傷胞絡只有涼胎之法衄血丸丹皮白芍黃芩各一兩蒲黃炒側柏葉各一兩為末早米糊丸白湯下百丸胎前泄痢此因母傷椒姜熱毒入脾大腸火燥變成痢也初起一二日用甘連湯三帖立安如瀉日久妊婦形瘦精神短少者産後母子兩亡胎前漏紅有孕紅來如行經應期每月一至此是漏也小烏金丸海金沙煆三錢殭蠶小茴側柏葉百草霜川芎各五錢防風川歸各八錢蒼朮四錢厚朴六錢為末早米糊丸白湯下百丸胎前赤帶胎前漏赤帶來如豬肝水日夜不止精神不寧急服下方側柏丸側柏葉黃芩各四兩為末蜜丸空心白湯下百丸胎前白帶此胎氣虛先服梨花酒後用閉白丸梨花酒梨頭花炒為末酒送下閉白丸龍骨海螵蛸牡蠣赤石脂各五錢為末早米糊丸空心酒送下百丸胎前氣緊咳嗽動紅胎前氣緊動紅夜多咳嗽不止其經每月應期而至日午心熱氣急咳嗽人皆作癆症治不效宜先服逍遙散熱退用紫菀湯以止嗽而安胎前動紅此因失跌動傷惡血破來如水流不止急用膠艾湯以止其血再服安胎散以護其胎然此症如孕婦形盛而在三五日內可治若弱而久者難治安胎散阿膠人參茯苓川歸生地各一錢川芎甘草各五分小茴八角茴各八分空心服胎前小便不通此症名曰轉胞醫者多用車前八珍湯不效宜服八味丸空心下胎前大便不通此乃大腸熱結胎氣虛弱閉塞忌用芒硝等藥大能傷胎只服大黃湯大黃湯熟大黃二錢枳殼一錢水煎溫服胎前半産有孕三五月或七月而小産若不調治再孕復然服益母丸有奇功益母丸益母草一斤川歸四兩為末蜜丸彈子大空心白湯化三丸胎前怔忡有孕常心中恍惚遍身煩熱此血衰受孕不適而致硃砂湯豬心一個水一碗煎半碗調硃砂一錢服胎前浮腫此氣血俱虛衰而致切忌通泄之藥恐傷胎也大腹皮湯大腹皮五加皮各二錢青皮陳皮各一錢姜皮五分空心服胎前陰門腫此胎氣不能遊動而致安胎順血散訶子制水煎溫服胎前遍身痠懶其症面色青黃飲食不思精神困倦形容憔悴此因血少不養胎元之故宜服四物湯胎前下血胎前下血動胎有孕婦形盛而在三五日者急投安胎散可愈如形瘦弱者冷汗大出面色如灰四肢無力此日久病也因而神色失去不治胎前腳痛此下元氣血虛弱又兼風邪宜行氣行血服烏藥順氣散胎前中風其症牙關緊閉痰氣壅滿不知人事皆因食生冷兼在風前坐臥而致先用黃蠟丸擦牙再進排風散一二帖黃蠟丸枯礬一錢麻油黃蠟共熔化調擦牙關上排風散麻黃三分白朮二錢防風八分甘草六分杏仁川芎各二錢白蘚皮八分當歸茯苓各三錢獨活一錢姜三片棗一枚煎熱服胎前癱瘓其症手足不能動乃胃中痰閉氣血而致服烏藥順氣散取汗見效胎前腰痛此血去蔭胎不能養腎故腎水枯以致腰痛難忍豬腎丸豬腰子一對青鹽二錢曬乾為末蜜丸空心酒下三四十丸胎前頭痛此風邪入腦陽氣衰也投芎芷湯一二帖即安若原有頭風者不效芎芷湯川芎白芷菊花甘草白芍茯苓各一錢藁本石膏各六分加姜三片煎服若不效加細辛胎前泄瀉此症有四治春用二苓湯夏用三和湯秋用藿香正氣散冬用理中湯藿香正氣散藿香二錢紫蘇陳皮厚朴半夏大腹皮白朮茯苓桔梗白芷甘草各一錢加姜三片棗三枚研末沖服胎前心痛胎前心痛不可忍胎氣不順之故順氣手拈散五靈脂一錢草果一個元胡索沒藥各八分酒煎服又方烏梅一個紅棗三枚杏仁去皮尖七粒用搗成膏服胎前昏迷胎前昏迷忽然倒地乃血去養胎母無精神承兒不住故眼花頭暈此症無藥方只以補為主胎前大便虛急此因脾土燥大腸經澀只宜理脾通大腸不可用芒硝峻劑一枳湯枳實三錢水煎不拘時服胎前遍體瘙癢胎前遍體瘙癢出風疹此皮中有風不可服藥宜用樟腦調燒酒擦之即安胎前陰門癢有孕房事不節陽精留蓄因而作癢用川椒白芷散二帖川椒白芷散川椒一兩白芷一兩五錢水煎服頭煎以二煎日洗患處數次胎前濕熱不化陰門癢酒炒條芩八分酒炒歸身一錢五分酒炒白芍一錢五分老蘇梗一錢五分酒炒川斷肉三錢酒炒川黃柏六分川萆薢三錢蜜橘紅一錢炙甘草四分煎服胎前乳腫胎前兩乳腫生寒作熱名內吹乳皂角散皂角一條燒灰酒調服胎前咽痛此內傷寒攻上咽中胃有痰涎宜攻寒化痰為先升麻桔梗湯升麻三分甘草桔梗各八分防風一錢加元參一錢服二帖胎前消渴此乃血少三焦火勝而然加味四物湯川芎當歸熟地白芍各三錢生地八分黃柏麥冬各五分姜二片棗五枚煎服或六味地黃湯亦效胎前耳鳴此腎虛宜服豬腎丸空心酒下七日立安胎前潮熱不退胎前大渴潮熱不退腹中痛孩兒十月滿足無妨若在七八月孕時潮熱起恐母子兩亡臨産胎不降生臨産先有水水乾孩兒不下可用益母散生其水水泛舟行孩兒方下若不生則閉死益母散益母草三錢麝香一分白芷川歸川芎滑石各一錢肉桂八分水煎服祕傳難産方牆上或高處蛇蛻殼一條要頭向下而完全者瓦上焙乾為末每一錢加麝香二分用乳調膏藥貼産母臍上即生生畢即去此膏藥遲則腸出萬勿誤事如已至誤者即將此膏藥貼産母頂門腸即收收儘速去此膏藥斷不可再誤事死胎不下妊婦面赤口舌焦指甲黑此子死也用斬爛散打下死胎急救其母若面不青黑指甲猶紅其子尚未死不可輕用此方斬爛散肉桂一錢白芷錢半斑蝥五個滑石三錢水煎服若能連渣服更效胎衣不下此症當審其婦如胞在胸膈難治其婦必死若在小腹可治破靈丹紅花一兩蘇木五錢生酒煎服産後血氣痛産後余血未盡腹中疼痛遍身潮熱此惡血在腹故也去其餘血潮熱自退矣宜服紅花當歸散産後血盡作痛此腹中虛痛若有潮熱亦屬虛潮不可認作惡露未盡宜以四物湯加小茴烏藥乳香沒藥五靈脂元胡索産後惡露發熱此內傷外感症宜用五積散去麻黃加草果柴胡黃芩服一二帖後加減産後咳嗽此風寒傷肺變為咳嗽小青龍湯甘草乾薑各五分五味子三分半夏一錢杏仁一錢五分姜三片水煎溫服産後子宮突出此症不必服藥用鯉魚灰活鯉魚一個燒灰調青油搽患處産後瘕疸突出此症先服連翹散後用黃蠟膏貼之連翹散連翹黃耆炙花粉防風梔子各一錢甘草五分産後一月惡露重來此症來如流水不止昏迷倒地不省人事此乃未滿一月夫婦交媾房事搖動筋骨血不歸絡以致血崩不止急服金狗散産後氣急産後泄瀉氣緊不止大煩大熱口渴不止此內虛外熱之症不治産後舌黑産後舌黑如塵口乾無津液此腎經已絶之症不治産後譫語産後泄瀉譫語亂言此惡血攻心上盛下虛之症不治
